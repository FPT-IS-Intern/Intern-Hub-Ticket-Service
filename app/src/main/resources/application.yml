server:
  port: ${SERVER_PORT:8080}
  tomcat:
    connection-timeout: 20000
    accept-count: 30
  forward-headers-strategy: framework

spring:
  application:
    name: intern-hub-ticket-service
  threads:
    virtual:
      enabled: true 
  datasource:
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}?currentSchema=${SCHEMA_NAME:public}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 2
      connection-timeout: 30000
      idle-timeout: 120000
      max-lifetime: 300000
      keepalive-time: 60000
      leak-detection-threshold: 20000
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: ${SCHEMA_NAME:public}
        format_sql: true
        use_sql_comments: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml
    default-schema: ${SCHEMA_NAME:public}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ${spring.application.name}-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

ticket:
  kafka:
    approval-requests-topic: ticket.ticket.approved
    approval-consumer-group: ${spring.application.name}-approval-worker

management:
  opentelemetry:
    resource-attributes:
      "service.name": ${spring.application.name}
      "service.version": "1.0.5"
      "deployment.environment": ${DEPLOY_ENV:dev}
  logging:
    export:
      otlp:
        enabled: false
  tracing:
    export:
      otlp:
        enabled: false
  otlp:
    metrics:
      export:
        enabled: false

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: OFF

security:
  internal-secret: ${INTERNAL_SECRET_KEY:defaultSecretValue} 
  internal-path-prefix: /ticket/internal
  excluded-paths:
    - /ticket/health
    - /ticket/login
    - /v3/api-docs/**
    - /swagger-ui/**
    - /swagger-ui.html
    - /ticket/internal/**

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

services:
  gateway:
    url: ${GATEWAY_URL:http://localhost:8765}
  dms:
    service:
      url: ${DMS_SERVICE_URL:http://localhost:8081}

common:
  context:
    enabled: true 
  logging:
    enabled: ${COMMON_LOGGING_ENABLED:true}
    request: ${COMMON_LOGGING_REQUEST:true}
    response: ${COMMON_LOGGING_RESPONSE:true}
    header: ${COMMON_LOGGING_HEADER:true}
    mask-headers:
      - authorization
      - cookie
      - set-cookie
      - x-api-key
      - x-internal-secret
    mask-fields:
      - password
      - newPassword
      - confirmPassword
      - otp
      - accessToken
      - refreshToken
      - x-internal-secret
    exclude-paths:
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html

springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}   
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}

openapi:
  server:
    url: https://internhub-v2.bbtech.io.vn

aws:
  s3:
    endpoint: http://localhost:9000
    bucket-name: intern-hub-bucket
    credentials:
      access-key: minioadmin
      secret-key: minioadmin
    region: ap-southeast-1
