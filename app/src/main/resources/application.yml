server:
  port: ${SERVER_PORT:8080}
  tomcat:
    connection-timeout: 20000
    accept-count: 30
spring:
  application:
    name: ticket
  threads:
    virtual:
      enabled: true
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME}?currentSchema=${SCHEMA_NAME}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 2
      connection-timeout: 30000
      idle-timeout: 120000
      max-lifetime: 300000
      keepalive-time: 60000
      leak-detection-threshold: 20000
  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_schema: ${SCHEMA_NAME}
    hibernate:
      ddl-auto: none
    show-sql: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml
    default-schema: ${SCHEMA_NAME}
  web:
    resources:
      add-mappings: false
management:
  opentelemetry:
    resource-attributes:
      "service.name": ${spring.application.name}
      "service.version": "1.0.5"
      "deployment.environment": ${DEPLOY_ENV:dev}
  logging:
    export:
      otlp:
        enabled: false
  tracing:
    export:
      otlp:
        enabled: false
  otlp:
    metrics:
      export:
        enabled: false

security:
  internal-secret: ${INTERNAL_SECRET_KEY:defaultSecretValue}
  internal-path-prefix: /ticket/internal

# Feign client configuration for direct URL
feign:
  client:
    config:
      hrm:


services:
  gateway:
    url: ${GATEWAY_URL:http://localhost:8765}