server:
  port: ${SERVER_PORT:8080}
  tomcat:
    connection-timeout: 20000
    accept-count: 30
spring:
  application:
    name: ticket
  threads:
    virtual:
      enabled: true
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME}?currentSchema=${SCHEMA_NAME}
    driver-class-name: org.postgresql.Driver
  hikari:
    maximum-pool-size: 50
    minimum-idle: 10
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: ${SCHEMA_NAME}
        format_sql: true
        use_sql_comments: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml
    default-schema: ${SCHEMA_NAME}
  web:
    resources:
      add-mappings: false
management:
  opentelemetry:
    resource-attributes:
      "service.name": ${spring.application.name}
      "service.version": "1.0.5"
      "deployment.environment": ${DEPLOY_ENV:dev}
  logging:
    export:
      otlp:
        enabled: false
  tracing:
    export:
      otlp:
        enabled: false
  otlp:
    metrics:
      export:
        enabled: false

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.results: TRACE

security:
  internal-secret: ${INTERNAL_SECRET_KEY}
  internal-path-prefix: /ticket/internal

# Feign client configuration for direct URL
feign:
  client:
    config:
      hrm:

services:
  gateway:
    url: ${GATEWAY_URL:http://localhost:8765}

common:
  logging:
    enabled: ${COMMON_LOGGING_ENABLED:true}
    request: ${COMMON_LOGGING_REQUEST:true}
    response: ${COMMON_LOGGING_RESPONSE:true}
    header: ${COMMON_LOGGING_HEADER:true}
    mask-headers:
      - authorization
      - cookie
      - set-cookie
      - x-api-key
      - x-internal-secret
    mask-fields:
      - password
      - newPassword
      - confirmPassword
      - otp
      - accessToken
      - refreshToken
      - x-internal-secret