databaseChangeLog:
  - changeSet:
      id: 003-optimize-timestamps
      author: antigravity
      changes:
        - modifyDataType:
            tableName: ticket_type
            columnName: created_at
            newDataType: timestamptz
        - modifyDataType:
            tableName: ticket_type
            columnName: updated_at
            newDataType: timestamptz
        - modifyDataType:
            tableName: ticket
            columnName: created_at
            newDataType: timestamptz
        - modifyDataType:
            tableName: ticket
            columnName: updated_at
            newDataType: timestamptz
        - modifyDataType:
            tableName: leave_request
            columnName: created_at
            newDataType: timestamptz
        - modifyDataType:
            tableName: leave_request
            columnName: updated_at
            newDataType: timestamptz
        - modifyDataType:
            tableName: remote_request
            columnName: created_at
            newDataType: timestamptz
        - modifyDataType:
            tableName: remote_request
            columnName: updated_at
            newDataType: timestamptz
        - modifyDataType:
            tableName: evidence
            columnName: uploaded_at
            newDataType: timestamptz
        - modifyDataType:
            tableName: ticket_approval
            columnName: action_at
            newDataType: timestamptz
