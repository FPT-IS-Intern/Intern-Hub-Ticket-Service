databaseChangeLog:
  - changeSet:
      id: 001-update-level2-threshold-to-gt-10-days
      author: internhub-team
      changes:
        - sql:
            splitStatements: true
            stripComments: true
            sql: |
              UPDATE ticket_types
              SET approval_rule = jsonb_build_object(
                'condition', '#payload[''total_days''] > 10',
                'levelsIfTrue', 2,
                'levelsIfFalse', 1
              )
              WHERE form_config IS NOT NULL
                AND form_config::text ILIKE '%dateRange%';

  - changeSet:
      id: 002-apply-level2-threshold-to-all-daterange-types
      author: internhub-team
      changes:
        - sql:
            splitStatements: true
            stripComments: true
            sql: |
              UPDATE ticket_types
              SET approval_rule = jsonb_build_object(
                'condition', '#payload[''total_days''] > 10',
                'levelsIfTrue', 2,
                'levelsIfFalse', 1
              )
              WHERE form_config IS NOT NULL
                AND form_config::text ILIKE '%dateRange%';

  - changeSet:
      id: 003-force-threshold-for-all-range-date-ticket-types
      author: internhub-team
      changes:
        - sql:
            splitStatements: true
            stripComments: true
            sql: |
              UPDATE ticket_types
              SET approval_rule = jsonb_build_object(
                'condition', '#payload[''total_days''] > 10',
                'levelsIfTrue', 2,
                'levelsIfFalse', 1
              )
              WHERE form_config IS NOT NULL
                AND (
                  form_config::text ILIKE '%dateRange%'
                  OR form_config::text ILIKE '%start_date%'
                  OR form_config::text ILIKE '%end_date%'
                );
