databaseChangeLog:
  - changeSet:
      id: 009-add-version-to-remote-requests
      author: internhub-team
      changes:
        - addColumn:
            schemaName: ih_ticket
            tableName: remote_requests
            columns:
              - column:
                  name: version
                  type: integer
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
