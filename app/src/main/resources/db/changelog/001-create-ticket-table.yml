databaseChangeLog:
  - changeSet:
      id: 002-create-ticket-types-table
      author: internhub-team
      changes:
        - createTable:
            tableName: ticket_types
            schemaName: ih_ticket
            columns:
              - column: { name: ticket_type_id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: type_name, type: varchar(255), constraints: { nullable: false } }
              - column: { name: description, type: text }
              - column: { name: version, type: integer, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: is_deleted, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: created_at, type: bigint }
              - column: { name: updated_at, type: bigint }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }

  - changeSet:
      id: 003-create-tickets-table
      author: internhub-team
      changes:
        - createTable:
            tableName: tickets
            schemaName: ih_ticket
            columns:
              - column: { name: ticket_id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: bigint, constraints: { nullable: false } }
              - column: { name: ticket_type_id, type: bigint, constraints: { nullable: false } }
              - column: { name: status, type: varchar(50) }
              - column: { name: payload, type: jsonb }
              - column: { name: version, type: integer, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: is_deleted, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: created_at, type: bigint }
              - column: { name: updated_at, type: bigint }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
        - addForeignKeyConstraint:
            constraintName: fk_tickets_ticket_type
            baseTableSchemaName: ih_ticket
            baseTableName: tickets
            baseColumnNames: ticket_type_id
            referencedTableSchemaName: ih_ticket
            referencedTableName: ticket_types
            referencedColumnNames: ticket_type_id

  - changeSet:
      id: 004-create-ticket-approvals-table
      author: internhub-team
      changes:
        - createTable:
            tableName: ticket_approvals
            schemaName: ih_ticket
            columns:
              - column: { name: approval_id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: ticket_id, type: bigint, constraints: { nullable: false } }
              - column: { name: approver_id, type: bigint }
              - column: { name: action, type: varchar(50) }
              - column: { name: comment, type: text }
              - column: { name: idempotency_key, type: varchar(255), constraints: { unique: true } }
              - column: { name: action_at, type: bigint }
              - column: { name: status, type: varchar(50) }
              - column: { name: created_at, type: bigint }
              - column: { name: updated_at, type: bigint }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
        - addForeignKeyConstraint:
            constraintName: fk_ticket_approvals_ticket
            baseTableSchemaName: ih_ticket
            baseTableName: ticket_approvals
            baseColumnNames: ticket_id
            referencedTableSchemaName: ih_ticket
            referencedTableName: tickets
            referencedColumnNames: ticket_id

  - changeSet:
      id: 005-create-evidences-table
      author: internhub-team
      changes:
        - createTable:
            tableName: evidences
            schemaName: ih_ticket
            columns:
              - column: { name: evidence_id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: ticket_id, type: bigint }
              - column: { name: evidence_key, type: varchar(500) }
              - column: { name: file_type, type: varchar(100) }
              - column: { name: file_size, type: bigint }
              - column: { name: status, type: varchar(50) }
              - column: { name: created_at, type: bigint }
              - column: { name: updated_at, type: bigint }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
        - addForeignKeyConstraint:
            constraintName: fk_evidences_ticket
            baseTableSchemaName: ih_ticket
            baseTableName: evidences
            baseColumnNames: ticket_id
            referencedTableSchemaName: ih_ticket
            referencedTableName: tickets
            referencedColumnNames: ticket_id

  - changeSet:
      id: 006-create-outbox-events-table
      author: internhub-team
      changes:
        - createTable:
            tableName: outbox_events
            schemaName: ih_ticket
            columns:
              - column: { name: event_id, type: bigint, constraints: { primaryKey: true, nullable: false } }
              - column: { name: aggregate_type, type: varchar(255), constraints: { nullable: false } }
              - column: { name: aggregate_id, type: varchar(255), constraints: { nullable: false } }
              - column: { name: event_type, type: varchar(255), constraints: { nullable: false } }
              - column: { name: payload, type: jsonb, constraints: { nullable: false } }
              - column: { name: status, type: varchar(50), constraints: { nullable: false } }
              - column: { name: created_at, type: bigint }
              - column: { name: updated_at, type: bigint }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }

  - changeSet:
      id: 007-add-indexes
      author: internhub-team
      changes:
        - createIndex:
            indexName: idx_tickets_user_status
            schemaName: ih_ticket
            tableName: tickets
            columns:
              - column:
                  name: user_id
              - column:
                  name: status

        - createIndex:
            indexName: idx_tickets_ticket_type
            schemaName: ih_ticket
            tableName: tickets
            columns:
              - column:
                  name: ticket_type_id

        - createIndex:
            indexName: idx_tickets_created_at
            schemaName: ih_ticket
            tableName: tickets
            columns:
              - column:
                  name: created_at

        - sql:
            sql: CREATE INDEX idx_tickets_payload_gin ON ih_ticket.tickets USING GIN (payload);
  
  - changeSet:
      id: 008-create-ticket-type-approvers-table
      author: internhub-team
      changes:
        - createTable:
            tableName: ticket_type_approvers
            schemaName: ih_ticket
            columns:
              - column: { name: id, type: bigint, constraints: { primaryKey: true, nullable: false } }
              - column: { name: ticket_type_id, type: bigint, constraints: { nullable: false } }
              - column: { name: approver_id, type: bigint, constraints: { nullable: false } }
              - column: { name: created_at, type: bigint }
              - column: { name: updated_at, type: bigint }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }

        - addForeignKeyConstraint:
            constraintName: fk_ticket_type_approvers_type
            baseTableSchemaName: ih_ticket
            baseTableName: ticket_type_approvers
            baseColumnNames: ticket_type_id
            referencedTableSchemaName: ih_ticket
            referencedTableName: ticket_types
            referencedColumnNames: ticket_type_id

        - addUniqueConstraint:
            constraintName: uk_ticket_type_approver
            schemaName: ih_ticket
            tableName: ticket_type_approvers
            columnNames: ticket_type_id, approver_id

  - changeSet:
      id: 009-add-template-to-ticket-types
      author: internhub-team
      changes:
        - addColumn:
            schemaName: ih_ticket
            tableName: ticket_types
            columns:
              - column:
                  name: template
                  type: jsonb

  - changeSet:
      id: 010-add-approval-rule-to-ticket-types
      author: internhub-team
      changes:
        - addColumn:
            schemaName: ih_ticket
            tableName: ticket_types
            columns:
              - column:
                  name: approval_rule
                  type: jsonb

  - changeSet:
      id: 011-add-required-approvals-to-tickets
      author: internhub-team
      changes:
        - addColumn:
            schemaName: ih_ticket
            tableName: tickets
            columns:
              - column:
                  name: required_approvals
                  type: int
              - column:
                  name: current_approval_level
                  type: int
                  defaultValueNumeric: 1

  - changeSet:
      id: 012-add-approval-level-to-ticket-approvals
      author: internhub-team
      changes:
        - addColumn:
            schemaName: ih_ticket
            tableName: ticket_approvals
            columns:
              - column:
                  name: approval_level
                  type: int

  - changeSet:
      id: 013-add-column-require-evidence-to-ticket-types
      author: internhub-team
      changes:
        - addColumn:
            schemaName: ih_ticket
            tableName: ticket_types
            columns:
              - column:
                  name: require_evidence
                  type: boolean
                  defaultValueBoolean: false

  - changeSet:
      id: 014-rename-template-to-form-config
      author: linh.le
      comment: Đổi tên cột template thành form_config
      changes:
        - renameColumn:
            tableName: ticket_types
            oldColumnName: template
            newColumnName: form_config
            columnDataType: jsonb

  - changeSet:
      id: 015-add-approval-level-to-ticket-type-approvers
      author: internhub-team
      changes:
        - addColumn:
            schemaName: ih_ticket
            tableName: ticket_type_approvers
            columns:
              - column:
                  name: approval_level
                  type: int
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
        - dropUniqueConstraint:
            schemaName: ih_ticket
            tableName: ticket_type_approvers
            constraintName: uk_ticket_type_approver
        - addUniqueConstraint:
            schemaName: ih_ticket
            tableName: ticket_type_approvers
            constraintName: uk_ticket_type_approver_level
            columnNames: ticket_type_id, approver_id, approval_level

  - changeSet:
      id: 016-create-ticket-global-approvers-table
      author: internhub-team
      changes:
        - createTable:
            tableName: ticket_global_approvers
            schemaName: ih_ticket
            columns:
              - column: { name: approver_id, type: bigint, constraints: { primaryKey: true, nullable: false } }
              - column: { name: max_approval_level, type: int, defaultValueNumeric: 1, constraints: { nullable: false } }
              - column: { name: created_at, type: bigint }
              - column: { name: updated_at, type: bigint }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }


