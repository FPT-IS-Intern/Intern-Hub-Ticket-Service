databaseChangeLog:
  - changeSet:
      id: 008-add-indexes
      author: internhub-team
      changes:

        # tickets
        - createIndex:
            indexName: idx_tickets_user_status
            schemaName: ih_ticket
            tableName: tickets
            columns:
              - column:
                  name: user_id
              - column:
                  name: status

        - createIndex:
            indexName: idx_tickets_ticket_type
            schemaName: ih_ticket
            tableName: tickets
            columns:
              - column:
                  name: ticket_type_id

        - createIndex:
            indexName: idx_tickets_created_at
            schemaName: ih_ticket
            tableName: tickets
            columns:
              - column:
                  name: created_at

        # ticket approvals
        - createIndex:
            indexName: idx_ticket_approvals_ticket_status
            schemaName: ih_ticket
            tableName: ticket_approvals
            columns:
              - column:
                  name: ticket_id
              - column:
                  name: status

        # evidences
        - createIndex:
            indexName: idx_evidences_ticket
            schemaName: ih_ticket
            tableName: evidences
            columns:
              - column:
                  name: ticket_id
        
        # leave requests
        - createIndex:
            indexName: idx_leave_requests_ticket_id
            schemaName: ih_ticket
            tableName: leave_requests
            columns:
              - column:
                  name: ticket_id

        # remote requests
        - createIndex:
            indexName: idx_remote_requests_ticket_id
            schemaName: ih_ticket
            tableName: remote_requests
            columns:
              - column:
                  name: ticket_id

